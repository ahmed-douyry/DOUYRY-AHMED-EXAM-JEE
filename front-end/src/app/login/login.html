<div class="flex min-h-[calc(100vh-4rem)] items-center justify-center px-4 py-12">
  <div class="w-full max-w-md rounded-2xl border border-slate-800 bg-slate-900/60 p-8 shadow-2xl backdrop-blur">
    <h1 class="text-center text-xl font-semibold text-white">Connexion</h1>
    <p class="mt-1 text-center text-sm text-slate-400">Location vehicules — JWT</p>
    <form [formGroup]="loginForm" (ngSubmit)="handleLogin()" class="mt-8 space-y-4">
      <div>
        <label for="username" class="mb-1 block text-xs font-medium text-slate-400">Utilisateur</label>
        <input id="username" type="text" formControlName="username" 
          class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-600 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
      </div>
      <div>
        <label for="password" class="mb-1 block text-xs font-medium text-slate-400">Mot de passe</label>
        <input id="password" type="password" formControlName="password" 
          class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2.5 text-sm text-slate-100 placeholder:text-slate-600 focus:border-indigo-500 focus:outline-none focus:ring-1 focus:ring-indigo-500" />
      </div>
      <button type="submit" [disabled]="loginForm.invalid"
        class="w-full rounded-lg bg-indigo-600 py-2.5 text-sm font-semibold text-white shadow hover:bg-indigo-500 disabled:cursor-not-allowed disabled:opacity-40">
        Se connecter
      </button>
    </form>
  </div>
</div>
