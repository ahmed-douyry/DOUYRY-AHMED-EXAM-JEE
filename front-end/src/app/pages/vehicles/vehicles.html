<div class="mx-auto max-w-6xl px-4 py-8">
  <div class="mb-6 flex items-center justify-between">
    <div>
      <button type="button" (click)="back()" class="text-sm text-indigo-400 hover:text-indigo-300">&larr; Agences</button>
      <h1 class="mt-2 text-2xl font-semibold text-white">Vehicules — agence #{{ agencyId }}</h1>
    </div>
  </div>
  <div *ngIf="error" class="mb-4 rounded-lg border border-red-900/50 bg-red-950/40 px-4 py-3 text-sm text-red-200">{{ error }}</div>

  <div *ngIf="auth.hasRole('ROLE_EMPLOYE') || auth.hasRole('ROLE_ADMIN')" class="mb-10 grid gap-6 lg:grid-cols-2">
    <div class="rounded-xl border border-slate-800 bg-slate-900/50 p-5">
      <h2 class="mb-3 text-lg font-medium text-white">Ajouter une voiture</h2>
      <form [formGroup]="carForm" (ngSubmit)="saveCar()" class="grid gap-3 sm:grid-cols-2">
        <input formControlName="marque" placeholder="Marque" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <input formControlName="modele" placeholder="Modele" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <input formControlName="matricule" placeholder="Matricule" class="sm:col-span-2 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <input type="number" formControlName="prixParJour" placeholder="Prix / jour" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <input type="date" formControlName="dateMiseEnService" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <input type="number" formControlName="nombrePortes" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <select formControlName="typeCarburant" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm">
          <option value="ESSENCE">ESSENCE</option>
          <option value="DIESEL">DIESEL</option>
          <option value="HYBRIDE">HYBRIDE</option>
          <option value="ELECTRIQUE">ELECTRIQUE</option>
        </select>
        <select formControlName="boiteVitesse" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm">
          <option value="MANUELLE">MANUELLE</option>
          <option value="AUTOMATIQUE">AUTOMATIQUE</option>
        </select>
        <button type="submit" [disabled]="carForm.invalid" class="sm:col-span-2 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 disabled:opacity-40">Ajouter voiture</button>
      </form>
    </div>
    <div class="rounded-xl border border-slate-800 bg-slate-900/50 p-5">
      <h2 class="mb-3 text-lg font-medium text-white">Ajouter une moto</h2>
      <form [formGroup]="motoForm" (ngSubmit)="saveMoto()" class="grid gap-3 sm:grid-cols-2">
        <input formControlName="marque" placeholder="Marque" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <input formControlName="modele" placeholder="Modele" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <input formControlName="matricule" placeholder="Matricule" class="sm:col-span-2 rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <input type="number" formControlName="prixParJour" placeholder="Prix / jour" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <input type="date" formControlName="dateMiseEnService" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <input type="number" formControlName="cylindree" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm" />
        <select formControlName="typeMoto" class="rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm">
          <option value="SPORTIVE">SPORTIVE</option>
          <option value="SCOOTER">SCOOTER</option>
          <option value="ROADSTER">ROADSTER</option>
          <option value="TOURING">TOURING</option>
        </select>
        <label class="flex items-center gap-2 text-sm text-slate-300 sm:col-span-2">
          <input type="checkbox" formControlName="casqueInclus" /> Casque inclus
        </label>
        <button type="submit" [disabled]="motoForm.invalid" class="sm:col-span-2 rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 disabled:opacity-40">Ajouter moto</button>
      </form>
    </div>
  </div>

  <div class="overflow-hidden rounded-xl border border-slate-800 bg-slate-900/40">
    <table class="min-w-full divide-y divide-slate-800 text-sm">
      <thead class="bg-slate-900/80">
        <tr>
          <th class="px-4 py-3 text-left text-slate-400">#</th>
          <th class="px-4 py-3 text-left text-slate-400">Type</th>
          <th class="px-4 py-3 text-left text-slate-400">Marque / Modele</th>
          <th class="px-4 py-3 text-left text-slate-400">Matricule</th>
          <th class="px-4 py-3 text-left text-slate-400">Prix/j</th>
          <th class="px-4 py-3 text-left text-slate-400">Statut</th>
          <th class="px-4 py-3 text-right text-slate-400">Actions</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-800">
        <tr *ngFor="let v of vehicles" class="hover:bg-slate-800/40">
          <td class="px-4 py-3 text-slate-500">{{ v.id }}</td>
          <td class="px-4 py-3"><span class="rounded bg-slate-800 px-2 py-0.5 text-xs text-indigo-300">{{ v.vehicleKind }}</span></td>
          <td class="px-4 py-3 text-white">{{ v.marque }} {{ v.modele }}</td>
          <td class="px-4 py-3 text-slate-300">{{ v.matricule }}</td>
          <td class="px-4 py-3 text-slate-300">{{ v.prixParJour }}</td>
          <td class="px-4 py-3">
            <span class="rounded-full px-2 py-0.5 text-xs"
              [ngClass]="{
                'bg-emerald-500/20 text-emerald-300': v.statut === 'DISPONIBLE',
                'bg-amber-500/20 text-amber-200': v.statut === 'LOUE',
                'bg-slate-600/40 text-slate-300': v.statut === 'EN_MAINTENANCE'
              }">{{ v.statut }}</span>
          </td>
          <td class="px-4 py-3 text-right space-x-1">
            <button type="button" (click)="goRentals(v.id)" class="rounded-md bg-slate-800 px-2 py-1 text-xs text-slate-100 hover:bg-slate-700">Locations</button>
            <ng-container *ngIf="auth.hasRole('ROLE_EMPLOYE') || auth.hasRole('ROLE_ADMIN')">
              <button type="button" (click)="setStatus(v, 'DISPONIBLE')" class="rounded-md bg-emerald-900/50 px-2 py-1 text-xs text-emerald-200">Dispo</button>
              <button type="button" (click)="setStatus(v, 'EN_MAINTENANCE')" class="rounded-md bg-slate-700 px-2 py-1 text-xs">Maint.</button>
            </ng-container>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
